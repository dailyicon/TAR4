<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Amazing Race</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f1b2d;
      color: #ffffff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
      box-sizing: border-box;
      text-align: center;
    }
    .screen { display: none; width: 100%; max-width: 520px; }
    .screen.active { display: block; }
    h1 { font-size: 2.2em; margin-bottom: 10px; }
    button {
      font-size: 1.2em;
      padding: 14px 28px;
      margin-top: 16px;
      border: none;
      border-radius: 10px;
      background: #e63946;
      color: #ffffff;
      cursor: pointer;
    }
    button:active { background: #c1121f; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .team-btn {
      display: block;
      width: 100%;
      margin: 10px 0 0 0;
      background: #1d3050;
      border: 2px solid #2a4a78;
      font-size: 1.05em;
      text-align: left;
      line-height: 1.3;
    }
    .team-btn:active { background: #2a4a78; }

    .cash { font-size: 1.3em; margin: 10px 0; color: #06d6a0; font-weight: bold; }
    .skills {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 16px 0;
      text-align: left;
    }
    .skill {
      background: #1d3050;
      border: 1px solid #2a4a78;
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
    }
    .skill .lvl { font-weight: bold; color: #ffd166; }

    .status {
      background: #1d3050;
      border: 1px solid #2a4a78;
      border-radius: 10px;
      padding: 12px;
      margin: 12px 0;
      line-height: 1.6;
    }
    .opt-btn {
      display: block;
      width: 100%;
      margin: 10px 0 0 0;
      background: #1d3050;
      border: 2px solid #2a4a78;
      text-align: left;
    }
    .opt-btn:active { background: #2a4a78; }
  </style>
</head>
<body>

  <!-- Start -->
  <div id="start" class="screen active">
    <h1>The Amazing Race</h1>
    <p>Race around the world. Tap to begin.</p>
    <button onclick="showScreen('teams')">Start</button>
  </div>

  <!-- Choose team -->
  <div id="teams" class="screen">
    <h1>Choose Your Team</h1>
    <div id="teamList"></div>
    <button onclick="showScreen('start')">Back</button>
  </div>

  <!-- Roster -->
  <div id="roster" class="screen">
    <h1 id="rosterTeam"></h1>
    <div class="cash" id="rosterCash"></div>
    <p>Your skills:</p>
    <div class="skills" id="skillList"></div>
    <button onclick="startRace()">Start Racing</button>
    <br>
    <button onclick="showScreen('teams')">Pick a different team</button>
  </div>

  <!-- Race -->
  <div id="race" class="screen">
    <h1>The Race</h1>
    <div class="status" id="raceStatus"></div>
    <p>Choose your transport:</p>
    <div id="transportList"></div>
  </div>

  <!-- Finish -->
  <div id="finish" class="screen">
    <h1>Leg Complete!</h1>
    <div class="status" id="finishStatus"></div>
    <button onclick="showScreen('start')">Race Again</button>
  </div>

  <script>
    var teams = [
      "FUSS",
      "#idfk",
      "RUN... AWAY!! i'm... *growls* going BRUNGO MODE!!",
      "Fire Seal FOREVER!",
      "The Future Winners",
      "The Coconut Trees",
      "Paris",
      "Canoe! Campers",
      "The",
      "Team Yaoi",
      "Unlikely Winners: Electric Boogaloo",
      "i got an addiction with rhythm games",
      "Detour Divas",
      "plastique fantastique iconique ozempique terrifique tournament of all stars v69 [S10 - 1ST]",
      "The Good, The Furry, and the Wonderhoy!",
      "Frequent Laundry"
    ];

    var SKILL_TYPES = [
      "Mental", "Physical", "Endurance", "Puzzle", "Creativity",
      "Memory", "Translation", "Navigation", "Communication", "Dexterity",
      "Calculation", "Mobility", "Agility", "Negotiation", "Calibration"
    ];

    var STANDARD_TRANSPORT = [
      { method: "🚕 Taxi",  cost: 75, time: 10 },
      { method: "🚂 Train", cost: 50, time: 20 },
      { method: "🚌 Bus",   cost: 30, time: 30 },
      { method: "🚲 Bike",  cost: 15, time: 40 },
      { method: "🗺️ Map",   cost: 5,  time: 50 },
      { method: "🚶 Walk",  cost: 0,  time: 60 }
    ];

    var STARTING_MONEY = 500;
    var TOTAL_STOPS = 4;

    var player = { team: null, money: STARTING_MONEY, skills: {} };
    var currentStop = 0;
    var raceTime = 0;

    function buildTeamButtons() {
      var list = document.getElementById('teamList');
      list.innerHTML = '';
      teams.forEach(function (name) {
        var btn = document.createElement('button');
        btn.className = 'team-btn';
        btn.textContent = name;
        btn.onclick = function () { selectTeam(name); };
        list.appendChild(btn);
      });
    }

    function randomLevel() {
      return Math.floor(Math.random() * 11) + 1;
    }

    function selectTeam(name) {
      player.team = name;
      player.money = STARTING_MONEY;
      player.skills = {};
      SKILL_TYPES.forEach(function (skill) {
        player.skills[skill] = randomLevel();
      });
      showRoster();
    }

    function showRoster() {
      document.getElementById('rosterTeam').textContent = player.team;
      document.getElementById('rosterCash').textContent = "Cash: $" + player.money;
      var box = document.getElementById('skillList');
      box.innerHTML = '';
      SKILL_TYPES.forEach(function (skill) {
        var item = document.createElement('div');
        item.className = 'skill';
        item.innerHTML = '<span>' + skill + '</span><span class="lvl">' + player.skills[skill] + '</span>';
        box.appendChild(item);
      });
      showScreen('roster');
    }

    function startRace() {
      currentStop = 0;
      raceTime = 0;
      showRace();
    }

    function showRace() {
      document.getElementById('raceStatus').innerHTML =
        '<strong>' + player.team + '</strong><br>' +
        'Stop ' + (currentStop + 1) + ' of ' + TOTAL_STOPS + '<br>' +
        'Cash: $' + player.money + '<br>' +
        'Time elapsed: ' + raceTime + ' min';

      var list = document.getElementById('transportList');
      list.innerHTML = '';
      STANDARD_TRANSPORT.forEach(function (opt) {
        var btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.textContent = opt.method + '  —  $' + opt.cost + '  ·  ' + opt.time + ' min';
        if (opt.cost > player.money) {
          btn.disabled = true;
        }
        btn.onclick = function () { chooseTransport(opt); };
        list.appendChild(btn);
      });

      showScreen('race');
    }

    function chooseTransport(opt) {
      player.money = player.money - opt.cost;
      raceTime = raceTime + opt.time;
      currentStop = currentStop + 1;
      if (currentStop >= TOTAL_STOPS) {
        showFinish();
      } else {
        showRace();
      }
    }

    function showFinish() {
      document.getElementById('finishStatus').innerHTML =
        '<strong>' + player.team + '</strong><br>' +
        'You completed the leg in ' + raceTime + ' minutes.<br>' +
        'Cash left: $' + player.money;
      showScreen('finish');
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function (s) {
        s.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
    }

    buildTeamButtons();
  </script>

</body>
</html>
