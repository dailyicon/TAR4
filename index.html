<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Amazing Race</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f1b2d;
      color: #ffffff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
      box-sizing: border-box;
      text-align: center;
    }
    .screen { display: none; width: 100%; max-width: 520px; }
    .screen.active { display: block; }
    h1 { font-size: 2.2em; margin-bottom: 10px; }
    button {
      font-size: 1.2em;
      padding: 14px 28px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: #e63946;
      color: #ffffff;
      cursor: pointer;
    }
    button:active { background: #c1121f; }

    .team-btn {
      display: block;
      width: 100%;
      margin: 10px 0 0 0;
      background: #1d3050;
      border: 2px solid #2a4a78;
      font-size: 1.05em;
      text-align: left;
      line-height: 1.3;
    }
    .team-btn:active { background: #2a4a78; }
  </style>
</head>
<body>

  <!-- Screen 1: Start -->
  <div id="start" class="screen active">
    <h1>The Amazing Race</h1>
    <p>Race around the world. Tap to begin.</p>
    <button onclick="showScreen('teams')">Start</button>
  </div>

  <!-- Screen 2: Choose your team -->
  <div id="teams" class="screen">
    <h1>Choose Your Team</h1>
    <div id="teamList"></div>
    <button onclick="showScreen('start')">Back</button>
  </div>

  <!-- Screen 3: Confirmation -->
  <div id="confirm" class="screen">
    <h1>You're in!</h1>
    <p>Racing as:</p>
    <p id="chosenTeam" style="font-size:1.3em; font-weight:bold;"></p>
    <button onclick="showScreen('teams')">Pick a different team</button>
  </div>

  <script>
    // The team list, straight from your simulation
    var teams = [
      "FUSS",
      "#idfk",
      "RUN... AWAY!! i'm... *growls* going BRUNGO MODE!!",
      "Fire Seal FOREVER!",
      "The Future Winners",
      "The Coconut Trees",
      "Paris",
      "Canoe! Campers",
      "The",
      "Team Yaoi",
      "Unlikely Winners: Electric Boogaloo",
      "i got an addiction with rhythm games",
      "Detour Divas",
      "plastique fantastique iconique ozempique terrifique tournament of all stars v69 [S10 - 1ST]",
      "The Good, The Furry, and the Wonderhoy!",
      "Frequent Laundry"
    ];

    var chosenTeam = null;

    // Make one tappable button for every team
    function buildTeamButtons() {
      var list = document.getElementById('teamList');
      list.innerHTML = '';
      teams.forEach(function (name) {
        var btn = document.createElement('button');
        btn.className = 'team-btn';
        btn.textContent = name;
        btn.onclick = function () { selectTeam(name); };
        list.appendChild(btn);
      });
    }

    function selectTeam(name) {
      chosenTeam = name;
      document.getElementById('chosenTeam').textContent = name;
      showScreen('confirm');
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function (s) {
        s.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
    }

    buildTeamButtons();
  </script>

</body>
</html>
