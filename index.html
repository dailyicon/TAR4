<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Amazing Race</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #2d0f14;
      color: #ffffff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
      box-sizing: border-box;
      text-align: center;
    }
    .screen { display: none; width: 100%; max-width: 560px; }
    .screen.active { display: block; }
    h1 { font-size: 2.2em; margin-bottom: 10px; }
    button {
      font-size: 1.2em;
      padding: 14px 28px;
      margin-top: 16px;
      border: none;
      border-radius: 10px;
      background: #e63946;
      color: #ffffff;
      cursor: pointer;
    }
    button:active { background: #c1121f; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .team-btn {
      display: block;
      width: 100%;
      margin: 10px 0 0 0;
      background: #4a1620;
      border: 2px solid #8a2432;
      font-size: 1.05em;
      text-align: left;
      line-height: 1.3;
    }
    .team-btn:active { background: #8a2432; }

    .cash { font-size: 1.3em; margin: 10px 0; color: #06d6a0; font-weight: bold; }
    .skills {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 16px 0;
      text-align: left;
    }
    .skill {
      background: #4a1620;
      border: 1px solid #8a2432;
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
    }
    .skill .lvl { font-weight: bold; color: #ffd166; }

    .status {
      background: #4a1620;
      border: 1px solid #8a2432;
      border-radius: 10px;
      padding: 12px;
      margin: 12px 0;
      line-height: 1.6;
    }
    .opt-btn {
      display: block;
      width: 100%;
      margin: 10px 0 0 0;
      background: #4a1620;
      border: 2px solid #8a2432;
      text-align: left;
    }
    .opt-btn:active { background: #8a2432; }

    .standings { text-align: left; margin-top: 8px; }
    .standings > div {
      padding: 6px 0;
      border-bottom: 1px solid #8a2432;
      line-height: 1.4;
    }

    .route-history {
      background: #3a1118;
      border: 1px solid #8a2432;
      border-radius: 10px;
      padding: 10px;
      margin-top: 8px;
      line-height: 1.6;
      color: #ffd166;
      font-weight: bold;
    }

    .chart { border-collapse: collapse; margin: 8px auto 0; font-size: 0.85em; }
    .chart th, .chart td {
      border: 1px solid #8a2432;
      padding: 5px 7px;
      text-align: center;
      white-space: nowrap;
    }
    .chart th:first-child, .chart td:first-child { text-align: left; }
  </style>
</head>
<body>

  <!-- Start -->
  <div id="start" class="screen active">
    <h1>The Amazing Race</h1>
    <p>Race around the world. Tap to begin.</p>
    <button onclick="showScreen('teams')">Start</button>
  </div>

  <!-- Choose team -->
  <div id="teams" class="screen">
    <h1>Choose Your Team</h1>
    <div id="teamList"></div>
    <button onclick="showScreen('start')">Back</button>
  </div>

  <!-- Roster -->
  <div id="roster" class="screen">
    <h1 id="rosterTeam"></h1>
    <div class="cash" id="rosterCash"></div>
    <p>Your skills:</p>
    <div class="skills" id="skillList"></div>
    <button onclick="startSeason()">Start Racing</button>
    <br>
    <button onclick="showScreen('teams')">Pick a different team</button>
  </div>

  <!-- Leg Intro -->
  <div id="legIntro" class="screen">
    <h1 id="legIntroTitle"></h1>
    <div class="status" id="legIntroBody"></div>
    <button onclick="showTransportToAirport()">Begin Leg</button>
  </div>

  <!-- Special Transport -->
  <div id="specialTransport" class="screen">
    <h1 id="specialTransportTitle"></h1>
    <div class="status" id="specialTransportStatus"></div>
    <p>Choose your transport:</p>
    <div id="specialTransportList"></div>
  </div>

  <!-- Airport Start -->
  <div id="airportStart" class="screen">
    <h1>🛫 Airport Start</h1>
    <div class="status" id="airportStartBody"></div>
    <button onclick="showFlightScreen()">Continue to Flight</button>
  </div>

  <!-- Flight -->
  <div id="flight" class="screen">
    <h1>✈️ Flight</h1>
    <div class="status" id="flightBody"></div>
    <div class="status" id="flightResult"></div>
    <button id="flightBtn" onclick="flightButton()">Continue to Destination Airport</button>
  </div>

  <!-- Airport End -->
  <div id="airportEnd" class="screen">
    <h1>🛬 Destination Airport</h1>
    <div class="status" id="airportEndBody"></div>
    <button onclick="showTransportFromAirport()">Leave Airport</button>
  </div>

  <!-- Challenge -->
  <div id="challenge" class="screen">
    <h1>Challenge</h1>
    <div class="status" id="challengeStatus"></div>
    <div class="status" id="challengeInfo"></div>
    <button onclick="attemptChallenge()">Take on the challenge</button>
  </div>

  <!-- Race / transport -->
  <div id="race" class="screen">
    <h1>Travel On</h1>
    <div class="status" id="raceStatus"></div>
    <p>Choose your transport:</p>
    <div id="transportList"></div>
  </div>

  <!-- Pit Stop -->
  <div id="pitstop" class="screen">
    <h1 id="pitstopTitle">🏁 Pit Stop</h1>
    <div class="status" id="pitstopBody"></div>
    <button onclick="checkInAtPitStop()">Check In</button>
  </div>

  <!-- Results -->
  <div id="results" class="screen">
    <h1 id="resultsTitle"></h1>
    <div class="status" id="resultsBody"></div>
    <div id="resultsButtons"></div>
  </div>

  <script>
    var teams = [
      "FUSS",
      "#idfk",
      "RUN... AWAY!! i'm... *growls* going BRUNGO MODE!!",
      "Fire Seal FOREVER!",
      "The Future Winners",
      "The Coconut Trees",
      "Paris",
      "Canoe! Campers",
      "The",
      "Team Yaoi",
      "Unlikely Winners: Electric Boogaloo",
      "i got an addiction with rhythm games",
      "Detour Divas",
      "plastique fantastique iconique ozempique terrifique tournament of all stars v69 [S10 - 1ST]",
      "The Good, The Furry, and the Wonderhoy!",
      "Frequent Laundry"
    ];

    var SKILL_TYPES = [
      "Mental", "Physical", "Endurance", "Puzzle", "Creativity",
      "Memory", "Translation", "Navigation", "Communication", "Dexterity",
      "Calculation", "Mobility", "Agility", "Negotiation", "Calibration"
    ];

    var STANDARD_TRANSPORT = [
      { method: "🚕 Taxi",  cost: 75, time: 10 },
      { method: "🚂 Train", cost: 50, time: 20 },
      { method: "🚌 Bus",   cost: 30, time: 30 },
      { method: "🚲 Bike",  cost: 15, time: 40 },
      { method: "🗺️ Map",   cost: 5,  time: 50 },
      { method: "🚶 Walk",  cost: 0,  time: 60 }
    ];

    var WORLD_CITIES = [
      { name: "Tokyo",          lat: 35.6762,  lon: 139.6503 },
      { name: "London",         lat: 51.5074,  lon: -0.1278 },
      { name: "New York",       lat: 40.7128,  lon: -74.0060 },
      { name: "Paris",          lat: 48.8566,  lon: 2.3522 },
      { name: "Sydney",         lat: -33.8688, lon: 151.2093 },
      { name: "Cairo",          lat: 30.0444,  lon: 31.2357 },
      { name: "Rio de Janeiro", lat: -22.9068, lon: -43.1729 },
      { name: "Cape Town",      lat: -33.9249, lon: 18.4241 },
      { name: "Moscow",         lat: 55.7558,  lon: 37.6173 },
      { name: "Dubai",          lat: 25.2048,  lon: 55.2708 },
      { name: "Singapore",      lat: 1.3521,   lon: 103.8198 },
      { name: "Los Angeles",    lat: 34.0522,  lon: -118.2437 },
      { name: "Mumbai",         lat: 19.0760,  lon: 72.8777 },
      { name: "Beijing",        lat: 39.9042,  lon: 116.4074 },
      { name: "Mexico City",    lat: 19.4326,  lon: -99.1332 },
      { name: "Istanbul",       lat: 41.0082,  lon: 28.9784 },
      { name: "Bangkok",        lat: 13.7563,  lon: 100.5018 },
      { name: "Buenos Aires",   lat: -34.6037, lon: -58.3816 },
      { name: "Nairobi",        lat: -1.2921,  lon: 36.8219 },
      { name: "Reykjavik",      lat: 64.1466,  lon: -21.9426 },
      { name: "Honolulu",       lat: 21.3069,  lon: -157.8583 },
      { name: "Hong Kong",      lat: 22.3193,  lon: 114.1694 },
      { name: "Lima",           lat: -12.0464, lon: -77.0428 },
      { name: "Toronto",        lat: 43.6532,  lon: -79.3832 }
    ];

    var STARTING_MONEY = 150;
    var LEG_STIPEND = 125;
    var MIN_STOPS_PER_LEG = 2;
    var MAX_STOPS_PER_LEG = 5;
    var FINAL_MIN_STOPS_PER_LEG = 5;
    var FINAL_MAX_STOPS_PER_LEG = 7;
    var NON_ELIM_CHANCE = 0.15;
    var MIN_TRANSPORT_OPTIONS = 2;
    var MAX_TRANSPORT_OPTIONS = 4;

    var MINUTES_PER_DAY = 1440;
    var LEG_GAP_DAYS = 7;
    var LEG_GAP_MINUTES = LEG_GAP_DAYS * MINUTES_PER_DAY;
    var DEPARTURE_GAP_COMPRESSION = 0.5;

    var playerTeam = null;
    var skills = {};
    var money = {};
    var remainingTeams = [];
    var legNum = 1;
    var legStops = [];
    var legTransportOptions = [];
    var totalStopsThisLeg = 3;
    var currentStop = 0;
    var raceTime = 0;
    var raceClock = 0;
    var legStartClock = 0;
    var nextLegDepartureGap = 0;
    var nextLegStartClock = 0;
    var winnerCheckInClock = 0;
    var currentChallenge = null;
    var placementHistory = {};
    var routeHistory = [];

    var currentCity = null;
    var legOrigin = null;
    var legDest = null;
    var legFlightTime = 0;
    var legHasConnection = false;
    var legFlightDepartureMinute = 0;
    var flightResolved = false;
    var legIsNonElim = false;

    var airportStartTransportOptions = null;
    var airportEndTransportOptions = null;
    var specialTransportMode = null;

    function buildTeamButtons() {
      var list = document.getElementById('teamList');
      list.innerHTML = '';
      teams.forEach(function (name) {
        var btn = document.createElement('button');
        btn.className = 'team-btn';
        btn.textContent = name;
        btn.onclick = function () { selectTeam(name); };
        list.appendChild(btn);
      });
    }

    function randomLevel() {
      return Math.floor(Math.random() * 11) + 1;
    }

    function rollSkills() {
      var s = {};
      SKILL_TYPES.forEach(function (sk) { s[sk] = randomLevel(); });
      return s;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function formatDuration(minutes) {
      var rounded = Math.max(0, Math.round(minutes));

      if (rounded < 60) {
        return rounded + "m";
      }

      var hours = Math.floor(rounded / 60);
      var mins = rounded % 60;

      if (mins === 0) {
        return hours + "h";
      }

      return hours + "h " + mins + "m";
    }

    function pad2(n) {
      return n < 10 ? "0" + n : "" + n;
    }

    function formatFlightMinute(minute) {
      return ":" + pad2(minute);
    }

    function waitForHourlyDeparture(clockMinutes, departureMinute) {
      var minuteOfHour = Math.round(clockMinutes) % 60;

      if (minuteOfHour <= departureMinute) {
        return departureMinute - minuteOfHour;
      }

      return 60 - minuteOfHour + departureMinute;
    }

    function formatRaceDateTime(minutes) {
      var rounded = Math.max(0, Math.round(minutes));
      var monthNames = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
      ];
      var monthLengths = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];

      var totalDays = Math.floor(rounded / MINUTES_PER_DAY);
      var minuteOfDay = rounded % MINUTES_PER_DAY;

      var yearOffset = 0;
      while (totalDays >= 365) {
        totalDays -= 365;
        yearOffset += 1;
      }

      var monthIndex = 0;
      while (monthIndex < monthLengths.length && totalDays >= monthLengths[monthIndex]) {
        totalDays -= monthLengths[monthIndex];
        monthIndex += 1;
      }

      if (monthIndex >= monthNames.length) {
        monthIndex = 11;
      }

      var day = totalDays + 1;
      var hour24 = Math.floor(minuteOfDay / 60);
      var mins = minuteOfDay % 60;
      var ampm = hour24 >= 12 ? "PM" : "AM";
      var hour12 = hour24 % 12;
      if (hour12 === 0) {
        hour12 = 12;
      }

      var yearText = yearOffset > 0 ? " Year " + (yearOffset + 1) : "";
      return monthNames[monthIndex] + " " + day + ", " + hour12 + ":" + pad2(mins) + " " + ampm + yearText;
    }

    function addRaceMinutes(minutes) {
      var rounded = Math.max(0, Math.round(minutes));
      raceTime += rounded;
      raceClock += rounded;
    }

    function isFinalLeg() {
      return remainingTeams.length <= 3;
    }

    function currentLegLabel() {
      return isFinalLeg() ? "Final Leg" : "Leg " + legNum;
    }

    function cityAirportName(city) {
      if (!city || !city.name) {
        return "Unknown Airport";
      }

      return city.name + " Airport";
    }

    function shuffledCopy(arr) {
      var copy = arr.slice();
      for (var i = copy.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = copy[i];
        copy[i] = copy[j];
        copy[j] = temp;
      }
      return copy;
    }

    function makeTransportOptionsForSegment() {
      var count = randomInt(MIN_TRANSPORT_OPTIONS, MAX_TRANSPORT_OPTIONS);
      var walk = STANDARD_TRANSPORT.find(function (opt) {
        return opt.method.indexOf("Walk") !== -1;
      });
      var paidOptions = STANDARD_TRANSPORT.filter(function (opt) {
        return opt !== walk;
      });

      var selected = shuffledCopy(paidOptions).slice(0, count - 1);

      if (walk) {
        selected.push(walk);
      }

      selected.sort(function (a, b) {
        return a.time - b.time;
      });

      return selected;
    }

    function chooseRivalTransport(name, options) {
      var affordable = options.filter(function (o) {
        return o.cost <= money[name];
      });

      var pick;
      if (affordable.length > 0) {
        pick = affordable[Math.floor(Math.random() * affordable.length)];
      } else {
        pick = options.reduce(function (cheapest, opt) {
          return opt.cost < cheapest.cost ? opt : cheapest;
        }, options[0]);
      }

      money[name] -= pick.cost;
      return pick;
    }

    function updateRouteHistoryForCompletedLeg() {
      if (!legDest) {
        return;
      }

      if (routeHistory.length === 0 && legOrigin) {
        routeHistory.push(legOrigin.name);
      }

      var lastCity = routeHistory[routeHistory.length - 1];
      if (lastCity !== legDest.name) {
        routeHistory.push(legDest.name);
      }
    }

    function routeHistoryHtml() {
      if (routeHistory.length === 0) {
        return '';
      }

      return '<div class="route-history">' + routeHistory.join(' → ') + '</div>';
    }

    function legRouteTitle(prefix) {
      return prefix + ': ' + legOrigin.name + ' → ' + legDest.name;
    }

    function selectTeam(name) {
      playerTeam = name;
      skills[name] = rollSkills();
      showRoster();
    }

    function showRoster() {
      document.getElementById('rosterTeam').textContent = playerTeam;
      document.getElementById('rosterCash').textContent = "Cash: $" + STARTING_MONEY;
      var box = document.getElementById('skillList');
      box.innerHTML = '';
      SKILL_TYPES.forEach(function (skill) {
        var item = document.createElement('div');
        item.className = 'skill';
        item.innerHTML = '<span>' + skill + '</span><span class="lvl">' + skills[playerTeam][skill] + '</span>';
        box.appendChild(item);
      });
      showScreen('roster');
    }

    function skillMultiplier(level) {
      return 1.6 - 0.1 * level;
    }

    function haversineKm(a, b) {
      var R = 6371;
      var toRad = function (d) { return d * Math.PI / 180; };
      var dLat = toRad(b.lat - a.lat);
      var dLon = toRad(b.lon - a.lon);
      var lat1 = toRad(a.lat);
      var lat2 = toRad(b.lat);
      var x = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
      return Math.round(2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x)));
    }

    function flightMinutes(km) {
      return Math.round(km / 200) + 10;
    }

    function rollDelayMinutes() {
      if (Math.random() >= 0.2) return 0;
      var r = Math.random();
      var lo, hi;
      if (r < 0.50) { lo = 1; hi = 5; }
      else if (r < 0.80) { lo = 6; hi = 10; }
      else if (r < 0.95) { lo = 11; hi = 20; }
      else { lo = 21; hi = 30; }
      return randomInt(lo, hi);
    }

    function rollFlight() {
      var delay = rollDelayMinutes();
      var total = legFlightTime + delay;
      var missed = false;
      if (legHasConnection && delay >= 15) {
        missed = true;
        total += randomInt(20, 45);
      }
      return { total: total, delay: delay, missed: missed };
    }

    function startSeason() {
      remainingTeams = teams.slice();
      legNum = 1;
      money = {};
      placementHistory = {};
      routeHistory = [];
      raceClock = 0;
      legStartClock = 0;
      nextLegDepartureGap = 0;
      nextLegStartClock = 0;
      winnerCheckInClock = 0;

      teams.forEach(function (name) {
        money[name] = STARTING_MONEY;
        placementHistory[name] = [];
        if (!skills[name]) { skills[name] = rollSkills(); }
      });

      currentCity = WORLD_CITIES[Math.floor(Math.random() * WORLD_CITIES.length)];
      routeHistory.push(currentCity.name);
      startLeg();
    }

    function startLeg() {
      currentStop = 0;
      raceTime = 0;
      legStartClock = raceClock;
      legTransportOptions = [];
      airportStartTransportOptions = makeTransportOptionsForSegment();
      airportEndTransportOptions = makeTransportOptionsForSegment();

      if (isFinalLeg()) {
        totalStopsThisLeg = randomInt(FINAL_MIN_STOPS_PER_LEG, FINAL_MAX_STOPS_PER_LEG);
      } else {
        totalStopsThisLeg = randomInt(MIN_STOPS_PER_LEG, MAX_STOPS_PER_LEG);
      }

      if (legNum > 1) {
        remainingTeams.forEach(function (name) { money[name] += LEG_STIPEND; });
      }

      legIsNonElim = !isFinalLeg() && Math.random() < NON_ELIM_CHANCE;

      var dest;
      do {
        dest = WORLD_CITIES[Math.floor(Math.random() * WORLD_CITIES.length)];
      } while (dest.name === currentCity.name);
      legOrigin = currentCity;
      legDest = dest;
      var km = haversineKm(legOrigin, legDest);
      legFlightTime = flightMinutes(km);
      legHasConnection = Math.random() < 0.35;
      legFlightDepartureMinute = randomInt(0, 59);

      legStops = [];
      for (var i = 0; i < totalStopsThisLeg; i++) {
        var skill = SKILL_TYPES[Math.floor(Math.random() * SKILL_TYPES.length)];
        var base = randomInt(10, 40);
        legStops.push({ skill: skill, base: base });
      }

      document.getElementById('legIntroTitle').textContent = currentLegLabel();
      document.getElementById('legIntroBody').innerHTML =
        '<strong>' + playerTeam + '</strong><br><br>' +
        (isFinalLeg() ? '<strong>Three teams remain. First to the final mat wins.</strong><br><br>' : '') +
        'Starting City: <strong>' + legOrigin.name + '</strong><br>' +
        'Race Clock: <strong>' + formatRaceDateTime(raceClock) + '</strong><br>' +
        (legNum > 1 && nextLegDepartureGap > 0 ? 'Compressed Departure Gap: <strong>+' + formatDuration(nextLegDepartureGap) + '</strong><br>' : '') +
        '<br>Teams Remaining: <strong>' + remainingTeams.length + '</strong><br>' +
        'Your Cash: <strong>$' + money[playerTeam] + '</strong>';

      document.getElementById('airportStartBody').innerHTML =
        '<strong>' + playerTeam + '</strong><br><br>' +
        'You have reached <strong>' + cityAirportName(legOrigin) + '</strong>.<br><br>' +
        'Prepare to board a flight from <strong>' + legOrigin.name + '</strong> to <strong>' + legDest.name + '</strong>.<br><br>' +
        'Flight Schedule: <strong>Every hour at ' + formatFlightMinute(legFlightDepartureMinute) + '</strong><br>' +
        'Race Clock: <strong>' + formatRaceDateTime(raceClock) + '</strong>';

      document.getElementById('flightBody').innerHTML =
        '<strong>' + playerTeam + '</strong><br>' +
        currentLegLabel() + '<br><br>' +
        'Departing from <strong>' + cityAirportName(legOrigin) + '</strong><br>' +
        'Flying to <strong>' + cityAirportName(legDest) + '</strong>.<br><br>' +
        'Flight Schedule: <strong>Every hour at ' + formatFlightMinute(legFlightDepartureMinute) + '</strong><br>' +
        '~' + formatDuration(legFlightTime) + ' flight' +
        (legHasConnection ? '<br><br>🔗 This leg has a connection. A long delay could make you miss it.' : '');

      flightResolved = false;
      document.getElementById('flightResult').innerHTML = '';
      document.getElementById('flightBtn').textContent = 'Continue to Destination Airport';
      showScreen('legIntro');
    }

    function renderSpecialTransportOptions(options) {
      var list = document.getElementById('specialTransportList');
      list.innerHTML = '';

      options.forEach(function (opt) {
        var btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.textContent = opt.method + ' - $' + opt.cost + ' · ' + formatDuration(opt.time);
        if (opt.cost > money[playerTeam]) { btn.disabled = true; }
        btn.onclick = function () { chooseSpecialTransport(opt); };
        list.appendChild(btn);
      });
    }

    function showTransportToAirport() {
      specialTransportMode = "toAirport";

      document.getElementById('specialTransportTitle').textContent = 'Travel to Airport';
      document.getElementById('specialTransportStatus').innerHTML =
        '<strong>' + playerTeam + '</strong><br>' +
        'Travel from the Pit Start in <strong>' + legOrigin.name + '</strong><br>' +
        'to <strong>' + cityAirportName(legOrigin) + '</strong>.<br><br>' +
        'Race Clock: <strong>' + formatRaceDateTime(raceClock) + '</strong><br>' +
        'Leg Time: <strong>' + formatDuration(raceTime) + '</strong><br>' +
        'Cash: <strong>$' + money[playerTeam] + '</strong>';

      renderSpecialTransportOptions(airportStartTransportOptions);
      showScreen('specialTransport');
    }

    function showTransportFromAirport() {
      specialTransportMode = "fromAirport";

      document.getElementById('specialTransportTitle').textContent = 'Leave Airport';
      document.getElementById('specialTransportStatus').innerHTML =
        '<strong>' + playerTeam + '</strong><br>' +
        'Travel from <strong>' + cityAirportName(legDest) + '</strong><br>' +
        'to your first location in <strong>' + legDest.name + '</strong>.<br><br>' +
        'Race Clock: <strong>' + formatRaceDateTime(raceClock) + '</strong><br>' +
        'Leg Time: <strong>' + formatDuration(raceTime) + '</strong><br>' +
        'Cash: <strong>$' + money[playerTeam] + '</strong>';

      renderSpecialTransportOptions(airportEndTransportOptions);
      showScreen('specialTransport');
    }

    function chooseSpecialTransport(opt) {
      money[playerTeam] = money[playerTeam] - opt.cost;
      addRaceMinutes(opt.time);

      if (specialTransportMode === "toAirport") {
        showAirportStartScreen();
      } else if (specialTransportMode === "fromAirport") {
        showChallenge();
      }
    }

    function showAirportStartScreen() {
      var waitNow = waitForHourlyDeparture(raceClock, legFlightDepartureMinute);

      document.getElementById('airportStartBody').innerHTML =
        '<strong>' + playerTeam + '</strong><br><br>' +
        'You have reached <strong>' + cityAirportName(legOrigin) + '</strong>.<br><br>' +
        'Prepare to board a flight from <strong>' + legOrigin.name + '</strong> to <strong>' + legDest.name + '</strong>.<br><br>' +
        'Flight Schedule: <strong>Every hour at ' + formatFlightMinute(legFlightDepartureMinute) + '</strong><br>' +
        'Wait Until Departure: <strong>' + formatDuration(waitNow) + '</strong><br>' +
        'Race Clock: <strong>' + formatRaceDateTime(raceClock) + '</strong><br>' +
        'Leg Time: <strong>' + formatDuration(raceTime) + '</strong>';

      showScreen('airportStart');
    }

    function showFlightScreen() {
      resolveFlightNow();
      showScreen('flight');
    }

    function showAirportEndScreen() {
      document.getElementById('airportEndBody').innerHTML =
        '<strong>' + playerTeam + '</strong><br><br>' +
        'You have arrived at <strong>' + cityAirportName(legDest) + '</strong>.<br><br>' +
        'Destination City: <strong>' + legDest.name + '</strong><br><br>' +
        'Race Clock: <strong>' + formatRaceDateTime(raceClock) + '</strong><br>' +
        'Leg Time: <strong>' + formatDuration(raceTime) + '</strong><br><br>' +
        'Leave the airport to begin the leg tasks.';

      showScreen('airportEnd');
    }

    function flightButton() {
      showAirportEndScreen();
    }

    function resolveFlightNow() {
      if (flightResolved) {
        return;
      }

      var airportArrivalClock = raceClock;
      var wait = waitForHourlyDeparture(raceClock, legFlightDepartureMinute);

      if (wait > 0) {
        addRaceMinutes(wait);
      }

      var departureClock = raceClock;
      var f = rollFlight();
      addRaceMinutes(f.total);

      var msg = '🕒 Flight Schedule: <strong>Every hour at ' + formatFlightMinute(legFlightDepartureMinute) + '</strong><br>';

      if (wait === 0) {
        msg += 'You made the current departure.';
      } else {
        msg += 'You waited <strong>' + formatDuration(wait) + '</strong> for the next departure.';
      }

      msg += '<br>Airport Arrival: <strong>' + formatRaceDateTime(airportArrivalClock) + '</strong>';
      msg += '<br>Flight Departure: <strong>' + formatRaceDateTime(departureClock) + '</strong><br><br>';

      if (f.delay === 0) {
        msg += '✅ On time. No delay.';
      } else if (f.missed) {
        msg += '❌ Delayed ' + formatDuration(f.delay) + ', and you MISSED the connection. Rebooked at a cost of extra time.';
      } else {
        msg += '⏱️ Delayed ' + formatDuration(f.delay) + '.';
      }

      msg += '<br><br>📍 You have landed at <strong>' + cityAirportName(legDest) + '</strong>.';
      msg += '<br>Destination City: <strong>' + legDest.name + '</strong>.';

      var res = document.getElementById('flightResult');
      res.innerHTML =
        msg +
        '<br><br>Race Clock: <strong>' + formatRaceDateTime(raceClock) + '</strong>' +
        '<br>Leg Time: <strong>' + formatDuration(raceTime) + '</strong>';

      flightResolved = true;
    }

    function showChallenge() {
      var stop = legStops[currentStop];
      var level = skills[playerTeam][stop.skill];
      var adjusted = Math.max(1, Math.round(stop.base * skillMultiplier(level)));
      currentChallenge = { adjusted: adjusted };

      document.getElementById('challengeStatus').innerHTML =
        '<strong>' + playerTeam + '</strong><br>' +
        currentLegLabel() + ' · ' + legDest.name + '<br>' +
        'Stop ' + (currentStop + 1) + '<br>' +
        'Race Clock: <strong>' + formatRaceDateTime(raceClock) + '</strong><br>' +
        'Leg Time: <strong>' + formatDuration(raceTime) + '</strong><br>' +
        'Cash: <strong>$' + money[playerTeam] + '</strong>';

      document.getElementById('challengeInfo').innerHTML =
        'Challenge type: <strong>' + stop.skill + '</strong><br>' +
        'Challenge time: <strong>' + formatDuration(adjusted) + '</strong><br>' +
        'Your ' + stop.skill + ' level: <strong>' + level + '</strong>';

      showScreen('challenge');
    }

    function attemptChallenge() {
      addRaceMinutes(currentChallenge.adjusted);
      showRace();
    }

    function showRace() {
      document.getElementById('raceStatus').innerHTML =
        '<strong>' + playerTeam + '</strong><br>' +
        currentLegLabel() + ' · ' + legDest.name + '<br>' +
        'Stop ' + (currentStop + 1) + '<br>' +
        'Race Clock: <strong>' + formatRaceDateTime(raceClock) + '</strong><br>' +
        'Leg Time: <strong>' + formatDuration(raceTime) + '</strong><br>' +
        'Cash: <strong>$' + money[playerTeam] + '</strong>';

      if (!legTransportOptions[currentStop]) {
        legTransportOptions[currentStop] = makeTransportOptionsForSegment();
      }

      var optionsForThisSegment = legTransportOptions[currentStop];
      var list = document.getElementById('transportList');
      list.innerHTML = '';

      optionsForThisSegment.forEach(function (opt) {
        var btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.textContent = opt.method + ' - $' + opt.cost + ' · ' + formatDuration(opt.time);
        if (opt.cost > money[playerTeam]) { btn.disabled = true; }
        btn.onclick = function () { chooseTransport(opt); };
        list.appendChild(btn);
      });

      showScreen('race');
    }

    function chooseTransport(opt) {
      money[playerTeam] = money[playerTeam] - opt.cost;
      addRaceMinutes(opt.time);
      currentStop = currentStop + 1;
      if (currentStop >= totalStopsThisLeg) {
        showPitStopScreen();
      } else {
        showChallenge();
      }
    }

    function showPitStopScreen() {
      var finalLeg = isFinalLeg();

      document.getElementById('pitstopTitle').textContent = finalLeg ? '🏆 Finish Line' : '🏁 Pit Stop';

      document.getElementById('pitstopBody').innerHTML =
        '<strong>' + playerTeam + '</strong><br><br>' +
        (finalLeg
          ? 'You have reached the Finish Line in <strong>' + legDest.name + '</strong>.<br><br>'
          : 'You have reached the Pit Stop in <strong>' + legDest.name + '</strong>.<br><br>') +
        'Check-In Time: <strong>' + formatRaceDateTime(raceClock) + '</strong><br>' +
        'Leg Time: <strong>' + formatDuration(raceTime) + '</strong><br>' +
        'Cash: <strong>$' + money[playerTeam] + '</strong><br><br>' +
        (finalLeg ? 'Check in to reveal the winner.' : 'Check in to see the leg results.');

      showScreen('pitstop');
    }

    function checkInAtPitStop() {
      showLegResults();
    }

    function simulateRivalLeg(name) {
      var total = 0;

      var toAirportPick = chooseRivalTransport(name, airportStartTransportOptions);
      total += toAirportPick.time;

      var rivalAirportArrivalClock = legStartClock + total;
      var rivalFlightWait = waitForHourlyDeparture(rivalAirportArrivalClock, legFlightDepartureMinute);
      total += rivalFlightWait;

      total += rollFlight().total;

      var fromAirportPick = chooseRivalTransport(name, airportEndTransportOptions);
      total += fromAirportPick.time;

      legStops.forEach(function (stop, index) {
        var lvl = skills[name][stop.skill];
        total += Math.max(1, Math.round(stop.base * skillMultiplier(lvl)));

        var optionsForThisSegment = legTransportOptions[index];
        if (!optionsForThisSegment) {
          optionsForThisSegment = makeTransportOptionsForSegment();
          legTransportOptions[index] = optionsForThisSegment;
        }

        var pick = chooseRivalTransport(name, optionsForThisSegment);
        total += pick.time;
      });

      return total;
    }

    function standingsHtml(results) {
      var rows = '';

      results.forEach(function (r, i) {
        var isYou = (r.team === playerTeam);
        var style = isYou ? ' style="color:#ffd166;font-weight:bold;"' : '';
        var tag = isYou ? ' ← YOU' : '';
        var checkInClock = legStartClock + r.time;

        rows += '<div' + style + '>' +
          (i + 1) + '. ' + r.team +
          ' - ' + formatDuration(r.time) +
          ' · checked in ' + formatRaceDateTime(checkInClock) +
          tag +
          '</div>';
      });

      return '<div class="standings">' + rows + '</div>';
    }

    function truncateName(name, n) {
      return name.length > n ? name.slice(0, n - 1) + '…' : name;
    }

    function lastPlacement(name) {
      var h = placementHistory[name];
      for (var i = h.length - 1; i >= 0; i--) {
        if (h[i] != null) return { place: h[i], leg: i };
      }
      return { place: 999, leg: -1 };
    }

    function placementChartHtml() {
      var numLegs = placementHistory[teams[0]].length;
      if (numLegs === 0) return '';
      var sorted = teams.slice().sort(function (a, b) {
        var la = lastPlacement(a), lb = lastPlacement(b);
        if (la.place !== lb.place) return la.place - lb.place;
        return lb.leg - la.leg;
      });
      var html = '<div style="overflow-x:auto;"><table class="chart"><thead><tr><th>Team</th>';
      for (var l = 1; l <= numLegs; l++) { html += '<th>L' + l + '</th>'; }
      html += '<th>Avg</th></tr></thead><tbody>';
      sorted.forEach(function (name) {
        var h = placementHistory[name];
        var nums = h.filter(function (x) { return x != null; });
        var avg = nums.length ? (nums.reduce(function (s, x) { return s + x; }, 0) / nums.length).toFixed(1) : '';
        var isYou = (name === playerTeam);
        var rowStyle = isYou ? ' style="color:#ffd166;font-weight:bold;"' : '';
        html += '<tr' + rowStyle + '><td>' + truncateName(name, 14) + '</td>';
        h.forEach(function (p) { html += '<td>' + (p == null ? '' : p) + '</td>'; });
        html += '<td>' + avg + '</td></tr>';
      });
      html += '</tbody></table></div>';
      return html;
    }

    function renderResults(title, bodyHtml, buttonLabel, buttonAction) {
      document.getElementById('resultsTitle').textContent = title;
      document.getElementById('resultsBody').innerHTML = bodyHtml;
      var area = document.getElementById('resultsButtons');
      area.innerHTML = '';
      var btn = document.createElement('button');
      btn.textContent = buttonLabel;
      btn.onclick = buttonAction;
      area.appendChild(btn);
      showScreen('results');
    }

    function showLegResults() {
      var route = legOrigin.name + ' → ' + legDest.name;
      var results = [];
      remainingTeams.forEach(function (name) {
        var t = (name === playerTeam) ? raceTime : simulateRivalLeg(name);
        results.push({ team: name, time: t });
      });
      results.sort(function (a, b) { return a.time - b.time; });

      var playerResult = results.find(function (r) {
        return r.team === playerTeam;
      });

      var winnerTime = results[0].time;
      winnerCheckInClock = legStartClock + winnerTime;
      nextLegDepartureGap = playerResult ? Math.max(0, Math.round((playerResult.time - winnerTime) * DEPARTURE_GAP_COMPRESSION)) : 0;
      nextLegStartClock = winnerCheckInClock + LEG_GAP_MINUTES + nextLegDepartureGap;

      updateRouteHistoryForCompletedLeg();

      var placeOf = {};
      results.forEach(function (r, i) { placeOf[r.team] = i + 1; });
      teams.forEach(function (name) {
        placementHistory[name].push(placeOf[name] != null ? placeOf[name] : null);
      });

      var routeTrail = '<br><strong>Route History</strong>' + routeHistoryHtml();
      var chart = '<br><strong>Placement Chart</strong>' + placementChartHtml();
      var nextDepartureText =
        '<br>First-place check-in: <strong>' + formatRaceDateTime(winnerCheckInClock) + '</strong>' +
        '<br>Your next departure: <strong>' + formatRaceDateTime(nextLegStartClock) + '</strong>' +
        (nextLegDepartureGap > 0 ? '<br>Compressed gap from first place: <strong>+' + formatDuration(nextLegDepartureGap) + '</strong>' : '');

      if (isFinalLeg()) {
        var winner = results[0].team;
        var finalBody = route + standingsHtml(results) +
          routeTrail +
          '<br><br>🏆 <strong>' + winner + '</strong> has crossed the final mat and wins The Amazing Race!' +
          (winner === playerTeam ? '<br><strong>That is you. You won the whole race!</strong>' : '') +
          '<br><br>The race is complete.' +
          chart;

        renderResults('🏆 Final Leg: ' + route, finalBody, 'New Game', resetToStart);
        return;
      }

      var lastPlaceTeam = results[results.length - 1].team;

      if (legIsNonElim) {
        var nonElimBody = route + standingsHtml(results) +
          routeTrail +
          '<br><strong>' + lastPlaceTeam + '</strong> finished last, but this is a NON-ELIMINATION leg!' +
          '<br>No team has been eliminated.' +
          '<br>Teams left: ' + remainingTeams.length +
          ' · Your cash: $' + money[playerTeam] +
          nextDepartureText +
          chart;

        renderResults(legRouteTitle('Leg ' + legNum), nonElimBody, 'Next Leg', nextLeg);
        return;
      }

      remainingTeams = remainingTeams.filter(function (n) { return n !== lastPlaceTeam; });

      if (lastPlaceTeam === playerTeam) {
        var body2 = route + standingsHtml(results) +
          routeTrail +
          '<br>You finished last on Leg ' + legNum + ' and have been eliminated.' + chart;
        renderResults('Eliminated: ' + route, body2, 'New Game', resetToStart);
        return;
      }

      var body3 = route + standingsHtml(results) +
        routeTrail +
        '<br><strong>' + lastPlaceTeam + '</strong> finished last and is eliminated.' +
        '<br>Teams left: ' + remainingTeams.length +
        ' · Your cash: $' + money[playerTeam] +
        nextDepartureText +
        chart;
      renderResults(legRouteTitle('Leg ' + legNum), body3, 'Next Leg', nextLeg);
    }

    function nextLeg() {
      currentCity = legDest;
      legNum = legNum + 1;
      raceClock = nextLegStartClock;
      startLeg();
    }

    function resetToStart() {
      showScreen('start');
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function (s) {
        s.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
    }

    buildTeamButtons();
  </script>

</body>
</html>
